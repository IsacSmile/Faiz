<!DOCTYPE html>

  <body>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap");

      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
        font-family: montserrat;
      }

      .main-container {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
        padding: 2rem 0;
      }

      .item-container {
        max-width: 400px;
        margin: 1rem;
        box-shadow: rgb(84 128 203 / 30%) 1px 5px 8px -1px,
          rgb(91 140 223 / 3%) 0px 0px 0px 1px;
        transition: all ease-in-out 0.3s;
        border-radius: 5px;
      }
      .item-container:hover {
        box-shadow: #b4fb19 1px 1px 8px -3px, #bffb19 0px 0px 0px 1px;
        transition: 0.3s;
        cursor: pointer;
      }

      #img-ctrl {
        width: 100%;
    border-top-left-radius: 5px;
    border-top-right-radius: 5px;
    }

      .item-heading {
        font-size: 20px;
        font-weight: 400;
        text-transform: capitalize;
        padding: 10px 10px 10px 10px;
      }
      .heading{
        text-align: center;
        font-weight: 400;
        padding: 2rem 0 0 0;
      }
    </style>
